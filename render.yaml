
services:
  - type: web
    name: ai-linkedin-post-backend
    env: node
    plan: starter
    buildCommand: npm install &amp;&amp; npm run build
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 18
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: HUGGING_FACE_API_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
